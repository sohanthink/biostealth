<!DOCTYPE html>
<html>

<body onload="callREST()">

	<div>Total Count: 
	<div id="displayTotalCount"></div>
	</div>
	
		<div>Today Count: 
	<div id="displayTodayCount"></div>
	</div>
	
</body>


    <script>
        function callREST() {
            var xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function() {
                if (this.readyState == 4 && this.status == 200) {
                    
					const objCount = JSON.parse(this.responseText);
					document.getElementById("displayTodayCount").innerHTML = objCount.todayCount;
					document.getElementById("displayTotalCount").innerHTML = objCount.totalCount;
                }
            };
            xhttp.open("POST", "http://18.130.184.142:8080/api/AdminProfile/getFrameCount", true);
            xhttp.send();
        }
    </script>
	
</html>
